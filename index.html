<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我想用 Go，把 AI 应用真正做起来</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --surface: #ffffff;
        --text: #1f2328;
        --muted: #59636e;
        --border: #d0d7de;
        --quote: #0969da;
        --code-bg: #f6f8fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.75;
      }

      .page {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      .article {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px 22px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      .article > :first-child {
        margin-top: 0;
      }

      .article > :last-child {
        margin-bottom: 0;
      }

      h1, h2, h3 {
        line-height: 1.35;
        margin: 1.6em 0 0.8em;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.45rem;
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border);
      }

      p, ul, ol, blockquote, pre, table {
        margin: 1em 0;
      }

      blockquote {
        margin-left: 0;
        padding: 0.1em 1em;
        color: var(--muted);
        border-left: 4px solid var(--quote);
        background: #f8fbff;
      }

      ul, ol {
        padding-left: 1.5em;
      }

      li + li {
        margin-top: 0.35em;
      }

      code, pre {
        font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Consolas, monospace;
      }

      pre {
        overflow-x: auto;
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--code-bg);
        border: 1px solid var(--border);
        line-height: 1.6;
      }

      code {
        background: var(--code-bg);
        padding: 0.1em 0.35em;
        border-radius: 6px;
      }

      pre code {
        background: transparent;
        padding: 0;
      }

      hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 2em 0;
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 1.2em auto;
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
      }

      th, td {
        border: 1px solid var(--border);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f6f8fa;
      }

      @media (max-width: 640px) {
        .page {
          padding: 16px 12px 40px;
        }

        .article {
          padding: 18px 14px;
          border-radius: 10px;
        }

        h1 {
          font-size: 1.6rem;
        }

        h2 {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article id="article" class="article"></article>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function render() {
        const response = await fetch("./README.md", { cache: "no-store" });
        const markdown = await response.text();
        marked.setOptions({
          breaks: false,
          gfm: true
        });
        document.getElementById("article").innerHTML = marked.parse(markdown);
      }

      render();
    </script>
  </body>
</html>
